<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Driving Final</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

#ui{
 position:absolute; top:10px; left:10px;
 color:white; background:rgba(0,0,0,0.6);
 padding:10px;
}

.controls{
 position:absolute; bottom:20px;
 width:100%; display:flex;
 justify-content:space-around;
}

.btn{
 width:65px;height:65px;
 background:rgba(255,255,255,0.3);
 border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 color:white;
}
</style>
</head>

<body>

<div id="ui">Speed: 0</div>

<div class="controls">
<div class="btn" id="left">←</div>
<div class="btn" id="right">→</div>
<div class="btn" id="up">↑</div>
<div class="btn" id="brake">🛑</div>
</div>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000022);

// Camera
const camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,2000);

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xaaaaaa));

// 🌙 Moon
const moon = new THREE.Mesh(
 new THREE.SphereGeometry(5,32,32),
 new THREE.MeshBasicMaterial({color:0xffffff})
);
moon.position.set(50,50,-100);
scene.add(moon);

// ⭐ Stars
for(let i=0;i<200;i++){
 let star = new THREE.Mesh(
  new THREE.SphereGeometry(0.2),
  new THREE.MeshBasicMaterial({color:0xffffff})
 );
 star.position.set(
  Math.random()*200-100,
  Math.random()*100,
  Math.random()*-200
 );
 scene.add(star);
}

// Ground
const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(500,2000),
 new THREE.MeshPhongMaterial({color:0x003300})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// Road group
const roadGroup = new THREE.Group();
scene.add(roadGroup);

function createSegment(z){
 let g = new THREE.Group();

 // road
 let road = new THREE.Mesh(
  new THREE.PlaneGeometry(20,100),
  new THREE.MeshPhongMaterial({color:0x222222})
 );
 road.rotation.x=-Math.PI/2;
 g.add(road);

 // center line
 let line = new THREE.Mesh(
  new THREE.PlaneGeometry(0.5,100),
  new THREE.MeshBasicMaterial({color:0xffffff})
 );
 line.rotation.x=-Math.PI/2;
 line.position.y=0.01;
 g.add(line);

 // railings
 for(let i=-40;i<40;i+=10){
  let r1 = new THREE.Mesh(
   new THREE.BoxGeometry(0.3,1,5),
   new THREE.MeshPhongMaterial({color:0xaaaaaa})
  );
  r1.position.set(-10,0.5,i);
  g.add(r1);

  let r2 = r1.clone();
  r2.position.x = 10;
  g.add(r2);
 }

 g.position.z = z;
 return g;
}

// segments
let segments=[];
for(let i=0;i<6;i++){
 segments.push(createSegment(-i*100));
 segments.forEach(s=>roadGroup.add(s));
}

// 🌳 Trees
for(let i=0;i<50;i++){
 let tree = new THREE.Mesh(
  new THREE.ConeGeometry(2,6),
  new THREE.MeshPhongMaterial({color:0x00aa00})
 );
 tree.position.set(15+Math.random()*10,3,-i*40);
 scene.add(tree);

 let t2 = tree.clone();
 t2.position.x *= -1;
 scene.add(t2);
}

// 🚗 Car
const car = new THREE.Group();

let body = new THREE.Mesh(
 new THREE.BoxGeometry(2,1,4),
 new THREE.MeshPhongMaterial({color:0x0077ff})
);
body.position.y=1;
car.add(body);

// headlights
let h1 = new THREE.PointLight(0xffffff,1,20);
h1.position.set(-0.5,1,-2);
car.add(h1);

let h2 = h1.clone();
h2.position.x = 0.5;
car.add(h2);

scene.add(car);

// traffic
let traffic=[];
for(let i=0;i<3;i++){
 let t = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,4),
  new THREE.MeshPhongMaterial({color:0xff0000})
 );
 t.position.set((Math.random()*2-1)*5,1,-i*80);
 scene.add(t);
 traffic.push(t);
}

// controls
let move={l:0,r:0,u:0,b:0};
let speed=0;

function bind(id,k){
 let e=document.getElementById(id);
 e.onpointerdown=()=>move[k]=1;
 e.onpointerup=()=>move[k]=0;
}
bind("left","l");
bind("right","r");
bind("up","u");
bind("brake","b");

// curve control
let roadCurve = 0;

function animate(){
 requestAnimationFrame(animate);

 if(move.u) speed+=0.01;
 else speed*=0.98;
 if(move.b) speed*=0.9;

 car.position.z -= speed;

 // curve
 roadCurve = Math.sin(car.position.z * 0.02) * 5;

 if(move.l) car.position.x -= 0.15;
 if(move.r) car.position.x += 0.15;

 car.position.x += (roadCurve - car.position.x) * 0.02;

 car.position.x = Math.max(-8, Math.min(8, car.position.x));

 // endless
 segments.forEach(s=>{
  if(s.position.z > car.position.z + 50){
    s.position.z -= 600;
  }
 });

 // traffic
 traffic.forEach(t=>{
  t.position.z += speed+0.3;

  if(t.position.z > car.position.z+20){
    t.position.z -= 400;
    t.position.x = (Math.random()*2-1)*5;
  }

  if(car.position.distanceTo(t.position)<2){
    alert("CRASH 💥");
    location.reload();
  }
 });

 // camera
 camera.position.set(car.position.x,6,car.position.z+12);
 camera.lookAt(car.position);

 document.getElementById("ui").innerText="Speed: "+Math.floor(speed*100);

 renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
